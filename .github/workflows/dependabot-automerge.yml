name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Patch and minor bumps auto-merge; major bumps require a human
    # because they typically need API migrations in the same PR.
    # `--auto` waits for the branch-protection required checks (Test
    # and Formatting) to pass before actually merging, so a bump that
    # breaks the build will sit open instead of landing.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for non-major bumps
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
