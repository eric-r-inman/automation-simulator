name: Publish

# Fires only on a pushed release tag (e.g. `v0.1.0`).  The template's
# original "push to main → auto-bump + publish" trigger was aggressive
# for this project, and the `cargo install changelog-roller` step fails
# because changelog-roller is only distributed via its own Nix flake,
# not crates.io.  Releases are cut manually per Phase 10 of
# project_plan.org: bump the version in Cargo.toml, update
# CHANGELOG.org, commit, tag `vX.Y.Z`, push the tag.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish the lib crate
        run: cargo publish -p automation-simulator-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
