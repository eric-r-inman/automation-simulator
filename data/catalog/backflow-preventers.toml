# Backflow preventers stop irrigation water from flowing back into
# the potable supply.  Oregon requires at least an atmospheric
# vacuum breaker (AVB) on each residential spigot used for
# irrigation; some municipalities require a pressure vacuum breaker
# (PVB) or higher.

