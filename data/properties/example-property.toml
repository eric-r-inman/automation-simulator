# Example food-forest property.
#
# This fixture is a stand-in for a specific residential property
# without carrying any address or personal details.  Shape: two
# yards, two spigots, two manifolds, six irrigation zones (two
# raised veggie beds and four perennial/shrub zones).  Zone layout
# mirrors the common case the simulator targets: trees are *not*
# irrigated in this fixture.
#
# Every catalog id below must resolve in `data/catalog/*.toml`.
# The `cli seed` loader cross-validates before writing to the DB.

[property]
id = "example-property"
name = "Example Property"
climate_zone = "portland-or"
lot_area_sq_ft = 6000.0

[[property.yards]]
id = "yard-a"
name = "Yard A"
area_sq_ft = 2800.0

[[property.yards]]
id = "yard-b"
name = "Yard B"
area_sq_ft = 2200.0

[[property.spigots]]
id = "spigot-a"
mains_pressure_psi = 60.0
notes = "Yard A mains tap"

[[property.spigots]]
id = "spigot-b"
mains_pressure_psi = 60.0
notes = "Yard B mains tap"

[[manifolds]]
id = "manifold-a"
model_id = "generic-3zone-manifold"
spigot_id = "spigot-a"
zone_capacity = 3

[[manifolds]]
id = "manifold-b"
model_id = "generic-3zone-manifold"
spigot_id = "spigot-b"
zone_capacity = 3

# ── Zones ───────────────────────────────────────────────────────────────────
# Each zone picks the emitter that the soft-warn list in
# crates/lib/src/sim/zone.rs marks as typical for its plant kind, so
# loading this fixture raises no warnings.

[[zones]]
id = "zone-a1-veggies"
yard_id = "yard-a"
manifold_id = "manifold-a"
plant_kind = "veggie-bed"
emitter_spec_id = "inline-drip-12in"
soil_type_id = "silty-clay-loam"
area_sq_ft = 60.0
notes = "Raised bed; annuals"

[[zones]]
id = "zone-a2-shrubs"
yard_id = "yard-a"
manifold_id = "manifold-a"
plant_kind = "shrub"
emitter_spec_id = "1gph-pc"
soil_type_id = "silty-clay-loam"
area_sq_ft = 220.0

[[zones]]
id = "zone-a3-perennials"
yard_id = "yard-a"
manifold_id = "manifold-a"
plant_kind = "perennial"
emitter_spec_id = "1gph-pc"
soil_type_id = "silty-clay-loam"
area_sq_ft = 180.0

[[zones]]
id = "zone-b1-veggies"
yard_id = "yard-b"
manifold_id = "manifold-b"
plant_kind = "veggie-bed"
emitter_spec_id = "inline-drip-12in"
soil_type_id = "silty-clay-loam"
area_sq_ft = 50.0
notes = "Raised bed; annuals"

[[zones]]
id = "zone-b2-shrubs"
yard_id = "yard-b"
manifold_id = "manifold-b"
plant_kind = "shrub"
emitter_spec_id = "1gph-pc"
soil_type_id = "silty-clay-loam"
area_sq_ft = 160.0

[[zones]]
id = "zone-b3-perennials"
yard_id = "yard-b"
manifold_id = "manifold-b"
plant_kind = "perennial"
emitter_spec_id = "1gph-pc"
soil_type_id = "silty-clay-loam"
area_sq_ft = 140.0

