# ── Hardware instances ──────────────────────────────────────────────────────

[[controllers]]
id = "controller-main"
model_id = "example-24v-controller"
zone_assignments = [
  "zone-a1-veggies",
  "zone-a2-shrubs",
  "zone-a3-perennials",
  "zone-b1-veggies",
  "zone-b2-shrubs",
  "zone-b3-perennials",
]

[[sensors]]
id = "sensor-a1"
model_id = "example-soil-sensor"
zone_id = "zone-a1-veggies"

[[sensors]]
id = "sensor-a2"
model_id = "example-soil-sensor"
zone_id = "zone-a2-shrubs"

[[sensors]]
id = "sensor-a3"
model_id = "example-soil-sensor"
zone_id = "zone-a3-perennials"

[[sensors]]
id = "sensor-b1"
model_id = "example-soil-sensor"
zone_id = "zone-b1-veggies"

[[sensors]]
id = "sensor-b2"
model_id = "example-soil-sensor"
zone_id = "zone-b2-shrubs"

[[sensors]]
id = "sensor-b3"
model_id = "example-soil-sensor"
zone_id = "zone-b3-perennials"

[[weather_stations]]
id = "weather-main"
model_id = "example-ws"
# No yard_id: property-level station.

# ── Default schedule ────────────────────────────────────────────────────────
# Seven-bit weekday masks: Mon=1 .. Sun=64; 127 = every day.  Veggie
# beds run daily in the early morning; perennial/shrub zones run a
# few times a week to reflect established-plant needs.

[[schedule]]
zone_id = "zone-a1-veggies"
start_time_minutes_of_day = 360  # 06:00
duration_minutes = 15
day_mask = 127

[[schedule]]
zone_id = "zone-b1-veggies"
start_time_minutes_of_day = 375  # 06:15
duration_minutes = 15
day_mask = 127

[[schedule]]
zone_id = "zone-a2-shrubs"
start_time_minutes_of_day = 390  # 06:30
duration_minutes = 20
day_mask = 42  # Tue + Thu + Sat (2 + 8 + 32)

[[schedule]]
zone_id = "zone-a3-perennials"
start_time_minutes_of_day = 410  # 06:50
duration_minutes = 15
day_mask = 21  # Mon + Wed + Fri (1 + 4 + 16)

[[schedule]]
zone_id = "zone-b2-shrubs"
start_time_minutes_of_day = 425  # 07:05
duration_minutes = 20
day_mask = 42

[[schedule]]
zone_id = "zone-b3-perennials"
start_time_minutes_of_day = 445  # 07:25
duration_minutes = 15
day_mask = 21
